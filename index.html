  <!-- ADDER -->

  <!-- BULK MODAL -->
  <div id="modalOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s ease;">

      <div style="font-family:'Anton',sans-serif;font-size:15px;letter-spacing:1px;">일괄 가져오기/내보내기</div>
      <div style="font-size:11px;color:#5b5650;line-height:1.5;">한 줄에 단어 하나씩, <b>단어,뜻</b> 형식으로 입력하세요.</div>

        <button id="importBtn" style="all:unset;cursor:pointer;padding:9px 14px;background:#111;color:#e7b8da;font-size:11px;letter-spacing:.5px;text-transform:uppercase;font-weight:700;">가져오기</button>

  <div style="max-width:600px;padding:26px 20px 0;font-size:10.5px;line-height:1.6;color:#6b665f;text-align:center;">
    <b style="color:#8f8f8f;">[PC]</b> 영문 자판 그대로 타이핑 (예: d-u-s &rarr; 연). Backspace 수정, Enter 다음 단어.<br>
    <b style="color:#8f8f8f;">[모바일]</b> 상단 입력창을 터치하여 직접 타이핑하세요.

<script>
(function(){
  "use strict";
  const COL = { black:'#111111', pink:'#e7b8da', pinkDeep:'#c26fae', gray:'#c7c3ba', red:'#e0433a', green:'#2a9d55', mutedInk:'#8a857b' };

  const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const JUNG = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
  const JONG = ['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

  const KEY_TO_JAMO = { KeyQ:'ㅂ',KeyW:'ㅈ',KeyE:'ㄷ',KeyR:'ㄱ',KeyT:'ㅅ',KeyY:'ㅛ',KeyU:'ㅕ',KeyI:'ㅑ',KeyO:'ㅐ',KeyP:'ㅔ',KeyA:'ㅁ',KeyS:'ㄴ',KeyD:'ㅇ',KeyF:'ㄹ',KeyG:'ㅎ',KeyH:'ㅗ',KeyJ:'ㅓ',KeyK:'ㅏ',KeyL:'ㅣ',KeyZ:'ㅋ',KeyX:'ㅌ',KeyC:'ㅊ',KeyV:'ㅍ',KeyB:'ㅠ',KeyN:'ㅜ',KeyM:'ㅡ' };
  const KEY_TO_JAMO_SHIFT = { KeyQ:'ㅃ',KeyW:'ㅉ',KeyE:'ㄸ',KeyR:'ㄲ',KeyT:'ㅆ',KeyO:'ㅒ',KeyP:'ㅖ' };
  const VOWELS_BASE = new Set(['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅜ','ㅛ','ㅠ','ㅡ','ㅣ']);
  const JUNG_COMBINE = {'ㅗㅏ':'ㅘ','ㅗㅐ':'ㅙ','ㅗㅣ':'ㅚ','ㅜㅓ':'ㅝ','ㅜㅔ':'ㅞ','ㅜㅣ':'ㅟ','ㅡㅣ':'ㅢ'};
  const JONG_COMBINE = {'ㄱㅅ':'ㄳ','ㄴㅈ':'ㄵ','ㄴㅎ':'ㄶ','ㄹㄱ':'ㄺ','ㄹㅁ':'ㄻ','ㄹㅂ':'ㄼ','ㄹㅅ':'ㄽ','ㄹㅌ':'ㄾ','ㄹㅍ':'ㄿ','ㄹㅎ':'ㅀ','ㅂㅅ':'ㅄ'};
  const VALID_JONG = new Set(CHO.filter(c=>c!=='ㄸ'&&c!=='ㅃ'&&c!=='ㅉ'));
  const JUNG_SPLIT = {}; for (const k in JUNG_COMBINE) JUNG_SPLIT[JUNG_COMBINE[k]]=[k[0],k[1]];
  const JONG_SPLIT = {}; for (const k in JONG_COMBINE) JONG_SPLIT[JONG_COMBINE[k]]=[k[0],k[1]];

  function composeSyllable(cho,jung,jong){
    const ci=CHO.indexOf(cho),ji=JUNG.indexOf(jung),fi=jong?JONG.indexOf(jong):0;
    if(ci<0||ji<0||fi<0) return (cho||'')+(jung||'')+(jong||'');
    return String.fromCodePoint(0xAC00+(ci*21+ji)*28+fi);
  }
  function decomposeChar(ch){
    const code=ch.codePointAt(0)-0xAC00;
    if(code<0||code>11171) return null;
    const cho=CHO[Math.floor(code/(21*28))];
    const jung=JUNG[Math.floor((code%(21*28))/28)];
    const jongIdx=code%28;
    const jong=jongIdx===0?null:JONG[jongIdx];
    return {char:ch,cho,jung,jong};
  }
  function decomposeWord(word){ return Array.from(word).map(decomposeChar).filter(Boolean); }
  function getSlotDescriptors(target){
    if(!target) return [{type:'cho'}];
    const slots=[{type:'cho',expected:target.cho}];
    const jp=JUNG_SPLIT[target.jung];
    if(jp) slots.push({type:'jung1',expected:jp[0]},{type:'jung2',expected:jp[1]});
    else slots.push({type:'jung',expected:target.jung});
    if(target.jong){
      const fp=JONG_SPLIT[target.jong];
      if(fp) slots.push({type:'jong1',expected:fp[0]},{type:'jong2',expected:fp[1]});
      else slots.push({type:'jong',expected:target.jong});
    }
    return slots;
  }

  function makeKoreanEngine(word){
    const targets=decomposeWord(word);
    let typed=[{cho:null,jung:null,jong:null}];
    let activeIndex=0;
    function current(){ return typed[activeIndex]; }
    function removeLastSlot(s){ if(s.jong!==null) s.jong=null; else if(s.jung!==null) s.jung=null; else if(s.cho!==null) s.cho=null; }
    function advance(newCho){ activeIndex++; typed[activeIndex]={cho:newCho,jung:null,jong:null}; }
    return {
      targets,
      get typed(){ return typed; },
      get activeIndex(){ return activeIndex; },
      feed(jamo,isVowel){
        const s=current();
        if(isVowel){
          if(s.cho===null&&s.jung===null) s.jung=jamo;
          else if(s.jung===null) s.jung=jamo;
          else if(s.jong===null){ const c=JUNG_COMBINE[s.jung+jamo]; if(c) s.jung=c; }
          else { const moving=s.jong; s.jong=null; advance(moving); current().jung=jamo; }
        } else {
          if(s.cho===null) s.cho=jamo;
          else if(s.jung===null) advance(jamo);
          else if(s.jong===null){ if(VALID_JONG.has(jamo)) s.jong=jamo; else advance(jamo); }
          else { const c=JONG_COMBINE[s.jong+jamo]; if(c) s.jong=c; else advance(jamo); }
        }
      },
      backspace(){
        const s=current();
        if(s.cho===null&&s.jung===null&&s.jong===null){
          if(activeIndex>0){ activeIndex--; typed.length=activeIndex+1; removeLastSlot(current()); }
          return;
        }
        removeLastSlot(s);
      },
      syncWithString(str){
        typed=[];
        for(let i=0;i<str.length;i++){
          const dec=decomposeChar(str[i]);
          if(dec) typed.push({cho:dec.cho,jung:dec.jung,jong:dec.jong});
          else { const c=str[i]; if(CHO.includes(c)) typed.push({cho:c,jung:null,jong:null}); else if(JUNG.includes(c)) typed.push({cho:null,jung:c,jong:null}); else typed.push({cho:null,jung:null,jong:null}); }
        }
        if(typed.length===0) typed.push({cho:null,jung:null,jong:null});
        activeIndex=typed.length-1;
      }
    };
  }

  function composeDisplay(s){
    if(s.cho===null&&s.jung===null) return '';
    if(s.cho===null) return s.jung||'';
    if(s.jung===null) return s.cho;
    return composeSyllable(s.cho,s.jung,s.jong);
  }

  function evaluateSlotStates(target,s,descs){
    return descs.map(desc=>{
      if(desc.type==='cho') return s.cho===null?'pending':(s.cho===desc.expected?'ok':'bad');
      if(desc.type==='jung') return s.jung===null?'pending':(s.jung===desc.expected?'ok':'bad');
      if(desc.type==='jung1'){ if(s.jung===null) return 'pending'; if(s.jung===target.jung) return 'ok'; return s.jung===desc.expected?'ok':'bad'; }
      if(desc.type==='jung2'){ if(s.jung===null) return 'pending'; return s.jung===target.jung?'ok':'pending'; }
      if(desc.type==='jong') return s.jong===null?'pending':(s.jong===desc.expected?'ok':'bad');
      if(desc.type==='jong1'){ if(s.jong===null) return 'pending'; if(s.jong===target.jong) return 'ok'; return s.jong===desc.expected?'ok':'bad'; }
      if(desc.type==='jong2'){ if(s.jong===null) return 'pending'; return s.jong===target.jong?'ok':'pending'; }
      return 'pending';
    });
  }

  function renderSyllable(i,engine){
    const target=engine.targets[i];
    const descs=getSlotDescriptors(target);
    if(i>engine.activeIndex) return {mode:'light',text:target?target.char:'',slotStates:descs.map(()=>null)};
    const s=engine.typed[i];
    if(s.cho===null&&s.jung===null&&s.jong===null) return {mode:'dark',text:target?target.char:'',slotStates:descs.map(()=>null)};
    const states=evaluateSlotStates(target,s,descs);
    const hasError=states.includes('bad');
    const isComplete=!!target&&s.cho===target.cho&&s.jung===target.jung&&(s.jong||null)===(target.jong||null);
    let mode='dark'; if(hasError) mode='red'; else if(isComplete) mode='blue';
    return {mode,text:composeDisplay(s),hint:(hasError&&target)?target.char:null,slotStates:states};
  }

  function makeEnglishEngine(wordObj){
    let typed=[];
    const wordStr=wordObj?wordObj.word:'';
    return {
      word:wordStr, meaning:wordObj?wordObj.meaning:'',
      get typed(){ return typed; },
      type(ch){ typed.push(ch); },
      backspace(){ typed.pop(); },
      syncWithString(str){ typed=Array.from(str); }
    };
  }

  function renderEnglish(engine,dictation){
    const target=engine.word, typed=engine.typed;
    const n=Math.max(target.length,typed.length);
    const cells=[];
    for(let i=0;i<n;i++){
      if(i<typed.length){ const correct=i<target.length&&typed[i].toLowerCase()===target[i].toLowerCase(); cells.push({mode:correct?'green':'red',text:typed[i]}); }
      else cells.push({mode:'blank',text:''});
    }
    const started=typed.length>0;
    const complete=typed.length===target.length&&cells.every(c=>c.mode==='green');
    return {cells,started,complete,showHint:!started&&!dictation};
  }

  const DEFAULT_KO_WORDS=[
    {word:'연천',roman:'Yeoncheon'},{word:'전곡',roman:'Jeongok'},{word:'서울',roman:'Seoul'},
    {word:'강남',roman:'Gangnam'},{word:'잠실',roman:'Jamsil'},{word:'합정',roman:'Hapjeong'},
    {word:'관악',roman:'Gwanak'},{word:'닭고기',roman:'dakgogi (chicken)'},{word:'과자',roman:'gwaja (snack)'},{word:'의자',roman:'uija (chair)'}
  ];
  const DEFAULT_EN_WORDS=[
    {word:'embalm',meaning:'涂以防腐防臭药剂，使不朽'},{word:'apple',meaning:'苹果'},{word:'banana',meaning:'香蕉'},
    {word:'computer',meaning:'电脑'},{word:'keyboard',meaning:'键盘'},{word:'mountain',meaning:'山脉'},
    {word:'sandwich',meaning:'三明治'},{word:'elephant',meaning:'大象'},{word:'umbrella',meaning:'雨伞'},{word:'calendar',meaning:'日历'}
  ];

  let KO_WORDS = JSON.parse(localStorage.getItem('TRAINER_KO_WORDS')) || DEFAULT_KO_WORDS;
  let EN_WORDS_RAW = JSON.parse(localStorage.getItem('TRAINER_EN_WORDS')) || DEFAULT_EN_WORDS;
  let EN_WORDS = EN_WORDS_RAW.map(item=> typeof item==='string' ? {word:item,meaning:'暂无释义'} : item);

  let mode='ko', wordIndex=0, dictation=false, stats={correct:0,skipped:0};
  let koEngine = makeKoreanEngine(KO_WORDS[0]?KO_WORDS[0].word:'');
  let enEngine = makeEnglishEngine(EN_WORDS[0]);

  const $ = (id)=> document.getElementById(id);
  const koRow=$('koRow'), enRow=$('enRow'), romanizationEl=$('romanization'), statusBanner=$('statusBanner');
  const progressEl=$('progress'), pageCounter=$('pageCounter');
  const drawer=$('drawer'), drawerContent=$('drawerContent');
  const mobileInput=$('mobileInput'), mobileTip=$('mobileTip');
  const favoriteBtn=$('favoriteBtn'), favoritesOnlyToggle=$('favoritesOnlyToggle');

  function currentWordCount(){ return mode==='ko'?KO_WORDS.length:EN_WORDS.length; }

  function loadWord(){
    const listCount=currentWordCount();
    mobileInput.value='';
    if(listCount===0){
      if(mode==='ko') koEngine=makeKoreanEngine(''); else enEngine=makeEnglishEngine(null);
      render(); renderDrawer(); return;
    }
    if(wordIndex>=listCount) wordIndex=0;
    if(wordIndex<0) wordIndex=listCount-1;
    if(mode==='ko'){
      koEngine=makeKoreanEngine(KO_WORDS[wordIndex].word);
      mobileInput.placeholder='한국어 키보드로 입력하세요';
      mobileTip.textContent='※ 한국어 모드일 때는 휴대폰의 한국어 키보드를 사용해 주세요.';
    } else {
      enEngine=makeEnglishEngine(EN_WORDS[wordIndex]);
      mobileInput.placeholder='English input here';
      mobileTip.textContent='※ 영어 모드일 때는 영문 키보드로 입력해 주세요.';
    }
    render(); renderDrawer(); updateFavoriteBtn();
  }

  function currentWordList(){ return mode==='ko' ? KO_WORDS : EN_WORDS; }
  function currentWordObj(){ return currentWordList()[wordIndex]; }

  function toggleFavoriteAt(index){
    const list = currentWordList();
    const item = list[index];
    if(!item) return;
    item.favorite = !item.favorite;
    localStorage.setItem(mode==='ko' ? 'TRAINER_KO_WORDS' : 'TRAINER_EN_WORDS', JSON.stringify(list));
    renderDrawer();
    if(index===wordIndex) updateFavoriteBtn();
  }

  function updateFavoriteBtn(){
    const w = currentWordObj();
    const fav = !!(w && w.favorite);
    favoriteBtn.textContent = fav ? '★ 즐겨찾기' : '☆ 즐겨찾기';
    favoriteBtn.style.color = fav ? COL.pink : '#f1ede6';
    favoriteBtn.style.borderColor = fav ? COL.pink : 'rgba(255,255,255,.3)';
  }

  function render(){
    const total=currentWordCount();
    progressEl.textContent = `정답 ${stats.correct} · 건너뜀 ${stats.skipped}`;
    pageCounter.textContent = total>0 ? `${wordIndex+1} / ${total}` : '0 / 0';

    if(total===0){
      koRow.innerHTML='<div style="color:#aaa;font-size:14px;">단어를 추가해 주세요!</div>';
      enRow.innerHTML='<div style="color:#aaa;font-size:14px;">Please add words!</div>';
      romanizationEl.textContent=''; statusBanner.textContent=''; return;
    }

    if(mode==='ko'){
      koRow.style.display='flex'; enRow.style.display='none';
      romanizationEl.textContent = KO_WORDS[wordIndex]?KO_WORDS[wordIndex].roman:'';
      koRow.innerHTML='';
      let allComplete=koEngine.activeIndex===koEngine.targets.length-1;
      let allCorrect=true;
      for(let i=0;i<koEngine.targets.length;i++){
        const r=renderSyllable(i,koEngine);
        if(r.mode!=='blue') allCorrect=false;
        if(i>koEngine.activeIndex) allComplete=false;
        const block=document.createElement('div');
        block.style.cssText='display:flex;flex-direction:column;align-items:center;position:relative;min-width:40px;';
        if(r.hint){
          const hint=document.createElement('div');
          hint.style.cssText='position:absolute;top:-20px;font-size:12px;color:'+COL.mutedInk+';font-weight:600;white-space:nowrap;';
          hint.textContent=r.hint; block.appendChild(hint);
        }
        const charEl=document.createElement('div');
        const color = r.mode==='light'?COL.gray : r.mode==='dark'?COL.black : r.mode==='blue'?COL.pinkDeep : COL.red;
        charEl.style.cssText=`font-family:'Anton',sans-serif;font-size:44px;line-height:1;min-height:52px;display:flex;align-items:center;color:${color};`;
        charEl.textContent=r.text; block.appendChild(charEl);
        const dashes=document.createElement('div');
        dashes.style.cssText='display:flex;gap:4px;margin-top:6px;';
        for(let k=0;k<r.slotStates.length;k++){
          const st=r.slotStates[k];
          const d=document.createElement('div');
          const dc = st==='ok'?COL.pinkDeep : st==='bad'?COL.red : COL.gray;
          d.style.cssText=`width:16px;height:4px;border-radius:2px;background:${dc};`;
          dashes.appendChild(d);
        }
        block.appendChild(dashes);
        koRow.appendChild(block);
      }
      const lastTarget=koEngine.targets[koEngine.targets.length-1];
      const lastTyped=koEngine.typed[koEngine.activeIndex];
      const lastFilled = lastTarget ? (lastTarget.jong ? (lastTyped.cho&&lastTyped.jung&&lastTyped.jong) : (lastTyped.cho&&lastTyped.jung)) : false;
      const wordDone = allComplete && !!lastFilled;
      statusBanner.textContent = wordDone&&allCorrect ? '정답! Enter로 다음' : '';
      statusBanner.style.color = wordDone&&allCorrect ? COL.green : 'inherit';
    } else {
      koRow.style.display='none'; enRow.style.display='flex';
      romanizationEl.textContent = dictation ? '???' : (EN_WORDS[wordIndex]?EN_WORDS[wordIndex].meaning:'');
      enRow.innerHTML='';
      const r=renderEnglish(enEngine,dictation);
      if(!r.started){
        const word=enEngine.word||'';
        for(const ch of word){
          const block=document.createElement('div');
          block.style.cssText='display:flex;flex-direction:column;align-items:center;min-width:22px;';
          const charEl=document.createElement('div');
          charEl.style.cssText=`font-family:'Anton',sans-serif;font-size:38px;line-height:1;min-height:46px;display:flex;align-items:center;color:${COL.gray};`;
          charEl.textContent = r.showHint ? ch : '';
          block.appendChild(charEl);
          const under=document.createElement('div');
          under.style.cssText=`width:100%;height:4px;border-radius:2px;margin-top:6px;background:${COL.gray};`;
          block.appendChild(under);
          enRow.appendChild(block);
        }
      } else {
        for(const c of r.cells){
          const block=document.createElement('div');
          block.style.cssText='display:flex;flex-direction:column;align-items:center;min-width:22px;';
          const charEl=document.createElement('div');
          const color = c.mode==='green'?COL.green : c.mode==='red'?COL.red : COL.gray;
          charEl.style.cssText=`font-family:'Anton',sans-serif;font-size:38px;line-height:1;min-height:46px;display:flex;align-items:center;color:${color};`;
          charEl.textContent=c.text; block.appendChild(charEl);
          const under=document.createElement('div');
          under.style.cssText=`width:100%;height:4px;border-radius:2px;margin-top:6px;background:${color};`;
          block.appendChild(under);
          enRow.appendChild(block);
        }
      }
      statusBanner.textContent = r.complete ? '정답! Enter로 다음' : '';
      statusBanner.style.color = r.complete ? COL.green : 'inherit';
    }
  }

  function renderDrawer(){
    drawerContent.innerHTML='';
    const total=currentWordCount();
    if(total===0){ drawerContent.innerHTML='<div style="color:#8f8f8f;text-align:center;padding:20px;">단어가 없습니다.</div>'; return; }
    const list = mode==='ko' ? KO_WORDS : EN_WORDS;
    const favoritesOnly = favoritesOnlyToggle.checked;
    let shown=0;
    list.forEach((item,index)=>{
      if(favoritesOnly && !item.favorite) return;
      shown++;
      const sub = mode==='ko' ? item.roman : item.meaning;
      drawerContent.appendChild(createWordItemDOM(index,item.word,sub,!!item.favorite,shown));
    });
    if(favoritesOnly && shown===0){
      drawerContent.innerHTML='<div style="color:#8f8f8f;text-align:center;padding:20px;">즐겨찾기한 단어가 없습니다.</div>';
    }
  }

  function createWordItemDOM(index,mainText,subText,isFavorite,displayIndex){
    const container=document.createElement('div');
    const active = index===wordIndex;
    container.style.cssText=`display:flex;justify-content:space-between;align-items:center;padding:12px;margin-bottom:6px;cursor:pointer;font-size:13px;border:1px solid ${active?COL.pink:'transparent'};background:${active?'rgba(231,184,218,.12)':'transparent'};color:${active?COL.pink:'#f1ede6'};`;
    container.addEventListener('click',(e)=>{ if(e.target.dataset.role) return; wordIndex=index; loadWord(); drawer.style.right='-360px'; });
    const info=document.createElement('div');
    info.style.cssText='display:flex;flex-direction:column;gap:2px;max-width:80%;';
    const mainSpan=document.createElement('span');
    mainSpan.textContent = `${displayIndex}. ${mainText}`;
    info.appendChild(mainSpan);
    if(subText){ const subSpan=document.createElement('span'); subSpan.style.cssText='font-size:11px;color:#8f8f8f;'; subSpan.textContent=subText; info.appendChild(subSpan); }
    const actions=document.createElement('div');
    actions.style.cssText='display:flex;align-items:center;gap:2px;';
    const favBtn=document.createElement('button');
    favBtn.dataset.role='fav';
    favBtn.textContent = isFavorite ? '★' : '☆';
    favBtn.style.cssText=`border:none;background:none;color:${isFavorite?COL.pink:'#8f8f8f'};font-weight:bold;cursor:pointer;padding:6px 8px;font-size:14px;`;
    favBtn.addEventListener('click',(e)=>{ e.stopPropagation(); toggleFavoriteAt(index); });
    const delBtn=document.createElement('button');
    delBtn.dataset.role='del';
    delBtn.textContent='✕';
    delBtn.style.cssText='border:none;background:none;color:#e0433a;font-weight:bold;cursor:pointer;padding:6px 10px;font-size:14px;';
    delBtn.addEventListener('click',(e)=>{ e.stopPropagation(); if(confirm(`'${mainText}' 단어를 삭제할까요?`)) deleteWordAt(index); });
    actions.appendChild(favBtn); actions.appendChild(delBtn);
    container.appendChild(info); container.appendChild(actions);
    return container;
  }

  function deleteWordAt(index){
    if(mode==='ko'){ KO_WORDS.splice(index,1); localStorage.setItem('TRAINER_KO_WORDS',JSON.stringify(KO_WORDS)); }
    else { EN_WORDS.splice(index,1); localStorage.setItem('TRAINER_EN_WORDS',JSON.stringify(EN_WORDS)); }
    if(wordIndex>=currentWordCount()) wordIndex=Math.max(0,currentWordCount()-1);
    loadWord();
  }

  function isWordCorrectNow(){
    if(currentWordCount()===0) return false;
    if(mode==='ko'){
      if(koEngine.activeIndex!==koEngine.targets.length-1) return false;
      for(let i=0;i<koEngine.targets.length;i++){ if(renderSyllable(i,koEngine).mode!=='blue') return false; }
      return true;
    }
    return renderEnglish(enEngine,dictation).complete;
  }

  function nextWord(markCorrect){
    if(currentWordCount()===0) return;
    if(markCorrect) stats.correct++; else stats.skipped++;
    wordIndex=(wordIndex+1)%currentWordCount();
    loadWord();
  }
  function prevWord(){
    if(currentWordCount()===0) return;
    wordIndex=(wordIndex-1+currentWordCount())%currentWordCount();
    loadWord();
  }

  mobileInput.addEventListener('input',(e)=>{
    const val=e.target.value;
    if(mode==='ko') koEngine.syncWithString(val); else enEngine.syncWithString(val);
    render();
  });
  mobileInput.addEventListener('keydown',(e)=>{ if(e.key==='Enter'){ e.preventDefault(); nextWord(isWordCorrectNow()); } });

  window.addEventListener('keydown',(e)=>{
    const activeTag = document.activeElement.tagName;
    if(activeTag==='INPUT'||activeTag==='TEXTAREA'){
      if(e.code==='Enter' && (document.activeElement.id==='newWord'||document.activeElement.id==='newMeaning')) $('addWordBtn').click();
      return;
    }
    if(e.ctrlKey||e.metaKey||e.altKey) return;
    if(currentWordCount()===0) return;
    if(e.code==='Backspace'){ e.preventDefault(); if(mode==='ko') koEngine.backspace(); else enEngine.backspace(); render(); return; }
    if(e.code==='Enter'){ e.preventDefault(); nextWord(isWordCorrectNow()); return; }
    if(mode==='ko'){
      const jamo = e.shiftKey ? (KEY_TO_JAMO_SHIFT[e.code]||KEY_TO_JAMO[e.code]) : KEY_TO_JAMO[e.code];
      if(!jamo) return; e.preventDefault(); koEngine.feed(jamo,VOWELS_BASE.has(jamo)); render();
    } else if(/^Key[A-Z]$/.test(e.code)){ e.preventDefault(); enEngine.type(e.code.slice(3).toLowerCase()); render(); }
  });

  function setActiveTab(m){
    document.querySelectorAll('.tab-btn').forEach(b=>{ b.style.color = b.dataset.mode===m ? '#f1ede6' : '#8f8f8f'; });
    document.querySelectorAll('.tab-glyph').forEach(g=>{ g.textContent = g.dataset.mode===m ? '■' : '□'; g.style.color = g.dataset.mode===m ? COL.pink : '#8f8f8f'; });
  }
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{ mode=btn.dataset.mode; wordIndex=0; setActiveTab(mode); loadWord(); });
  });

  $('restartBtn').addEventListener('click', loadWord);
  $('skipBtn').addEventListener('click', ()=>nextWord(false));
  $('prevBtn').addEventListener('click', prevWord);

  $('openDrawerBtn').addEventListener('click', ()=>{ drawer.style.right='0'; renderDrawer(); });
  $('closeDrawerBtn').addEventListener('click', ()=>{ drawer.style.right='-360px'; });

  $('dictationToggle').addEventListener('change',(e)=>{ dictation=e.target.checked; render(); });

  favoriteBtn.addEventListener('click', ()=>{
    if(currentWordCount()===0) return;
    toggleFavoriteAt(wordIndex);
  });
  favoritesOnlyToggle.addEventListener('change', renderDrawer);

  $('addWordBtn').addEventListener('click', ()=>{
    const wordInput=$('newWord'), meaningInput=$('newMeaning');
    const word=wordInput.value.trim(), meaning=meaningInput.value.trim();
    if(!word){ alert('추가할 단어를 입력해 주세요!'); return; }
    const isKorean = /[ㄱ-ㅎㅏ-ㅣ가-힣]/.test(word);
    if(isKorean){
      KO_WORDS.push({word,roman:meaning||'Custom',favorite:false});
      localStorage.setItem('TRAINER_KO_WORDS',JSON.stringify(KO_WORDS));
      if(mode!=='ko'){ mode='ko'; setActiveTab('ko'); }
    } else {
      EN_WORDS.push({word,meaning:meaning||'Custom',favorite:false});
      localStorage.setItem('TRAINER_EN_WORDS',JSON.stringify(EN_WORDS));
      if(mode!=='en'){ mode='en'; setActiveTab('en'); }
    }
    wordInput.value=''; meaningInput.value='';
    wordIndex=currentWordCount()-1;
    loadWord();
  });

  $('clearWordsBtn').addEventListener('click', ()=>{
    if(confirm('모든 사용자 단어를 초기화하고 기본 단어로 복구하시겠습니까?')){
      localStorage.removeItem('TRAINER_KO_WORDS'); localStorage.removeItem('TRAINER_EN_WORDS');
      KO_WORDS=[...DEFAULT_KO_WORDS]; EN_WORDS=[...DEFAULT_EN_WORDS];
      wordIndex=0; loadWord();
    }
  });

  const modalOverlay=$('modalOverlay'), bulkTextarea=$('bulkTextarea');
  $('openBulkBtn').addEventListener('click', ()=>{
    modalOverlay.style.opacity='1'; modalOverlay.style.pointerEvents='auto';
    bulkTextarea.value = mode==='ko' ? KO_WORDS.map(i=>`${i.word},${i.roman}`).join('\n') : EN_WORDS.map(i=>`${i.word},${i.meaning}`).join('\n');
  });
  $('closeModalBtn').addEventListener('click', ()=>{ modalOverlay.style.opacity='0'; modalOverlay.style.pointerEvents='none'; });
  $('importBtn').addEventListener('click', ()=>{
    const rawText=bulkTextarea.value.trim();
    if(!rawText){ alert('가져올 내용을 입력해 주세요!'); return; }
    const lines=rawText.split('\n').map(l=>l.trim()).filter(Boolean);
    const tempKo=[], tempEn=[];
    lines.forEach(line=>{
      const parts=line.split(',');
      const word=parts[0]?parts[0].trim():'';
      const definition=parts[1]?parts[1].trim():'Custom';
      if(!word) return;
      if(/[ㄱ-ㅎㅏ-ㅣ가-힣]/.test(word)) tempKo.push({word,roman:definition,favorite:false});
      else tempEn.push({word,meaning:definition,favorite:false});
    });
    if(tempKo.length>0){ KO_WORDS=tempKo; localStorage.setItem('TRAINER_KO_WORDS',JSON.stringify(KO_WORDS)); }
    if(tempEn.length>0){ EN_WORDS=tempEn; localStorage.setItem('TRAINER_EN_WORDS',JSON.stringify(EN_WORDS)); }
    alert(`가져오기 완료! (한국어: ${tempKo.length}개, 영어: ${tempEn.length}개)`);
    modalOverlay.style.opacity='0'; modalOverlay.style.pointerEvents='none';
    wordIndex=0; loadWord();
  });

  setActiveTab('ko');
  loadWord();
})();
</script>
</body>
</html>
